apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prompt-routing-llm
  namespace: ai-inference
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gke-inference-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v1/chat/completions
    filters:
    - type: ExtensionRef
      extensionRef:
        group: networking.gke.io
        kind: GCAIPPolicy
        name: prefix-cache-aware-policy
    backendRefs:
    - group: ""
      kind: Service
      name: vllm-inference-service
      port: 8000
