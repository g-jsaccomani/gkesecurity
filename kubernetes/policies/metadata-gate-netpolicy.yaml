apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: block-metadata-server
  namespace: ai-inference
spec:
  podSelector: {} # Applies to all pods
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32 # Blocks all outbound traffic to GKE Metadata Server