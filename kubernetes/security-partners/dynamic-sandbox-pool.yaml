apiVersion: agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: dynamic-agent-sandbox-template
  namespace: ai-inference
spec:
  runtimeClassName: gvisor
  template:
    spec:
      containers:
      - name: adk-code-executor
        image: gcr.io/enterprise-core/adk-sandbox-runner:v1.0
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
---
apiVersion: agents.x-k8s.io/v1alpha1
kind: SandboxWarmPool
metadata:
  name: adk-agent-warm-pool
  namespace: ai-inference
spec:
  size: 30
  templateRef:
    name: dynamic-agent-sandbox-template

